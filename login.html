<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Projet R</title>
    <link rel="stylesheet" href="./static/styles/styles.css ">
    <link rel="stylesheet" href="./static/styles/login.css">
</head>
<body>
    <div class="container">
        <h1 class="title">PROJET</h1>
        <img src="./static/images/logo.png" alt="Logo du projet" class="logo">
        
        <div class="login-container">
            <h2>SE CONNECTER</h2>
            <form action="/login" method="post">
                <input type="text" name="username" placeholder="Nom d'utilisateur">
                <input type="password" name="password" placeholder="Mot de passe">
                <button type="submit">Se connecter</button>
            </form>
        </div>

        <div class="character-layer">
            <img src="./static/images/jessie-neon.png" alt="Personnage de Jessie" class="character">
            <img src="./static/images/james-neon.png" alt="Personnage de James" class="character">
        </div>
    </div>

    
</body>
</html>
